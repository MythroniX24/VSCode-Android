name: Lint

on:
  pull_request:
    branches: [main]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Support submodule VSCodroid-main nested directory layout
        run: |
          if [ -d "VSCodroid-main/android" ]; then
            echo "Submodule/nested directory VSCodroid-main detected with valid sources. Syncing to root directory structure..."
            [ -d "VSCodroid-main/android/app" ] && [ ! -d "app" ] && ln -s VSCodroid-main/android/app app || true
            [ -d "VSCodroid-main/android/toolchain_go" ] && [ ! -d "toolchain_go" ] && ln -s VSCodroid-main/android/toolchain_go toolchain_go || true
            [ -d "VSCodroid-main/android/toolchain_ruby" ] && [ ! -d "toolchain_ruby" ] && ln -s VSCodroid-main/android/toolchain_ruby toolchain_ruby || true
            [ -d "VSCodroid-main/android/toolchain_java" ] && [ ! -d "toolchain_java" ] && ln -s VSCodroid-main/android/toolchain_java toolchain_java || true
            [ -d "VSCodroid-main/scripts" ] && [ ! -d "scripts" ] && ln -s VSCodroid-main/scripts scripts || true
            [ -d "VSCodroid-main/android/gradle" ] && [ ! -d "gradle" ] && ln -s VSCodroid-main/android/gradle gradle || true
            [ -f "VSCodroid-main/android/gradlew" ] && [ ! -f "gradlew" ] && ln -s VSCodroid-main/android/gradlew gradlew || true
            [ -f "VSCodroid-main/android/gradlew.bat" ] && [ ! -f "gradlew.bat" ] && ln -s VSCodroid-main/android/gradlew.bat gradlew.bat || true
            [ -f "VSCodroid-main/android/gradle.properties" ] && [ ! -f "gradle.properties" ] && ln -s VSCodroid-main/android/gradle.properties gradle.properties || true
            [ -f "VSCodroid-main/android/build.gradle.kts" ] && [ ! -f "build.gradle.kts" ] && ln -s VSCodroid-main/android/build.gradle.kts build.gradle.kts || true
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 36

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Lint only needs compiled Kotlin, not runtime assets.
      # Create minimal directory structure so Gradle does not fail.
      - name: Create minimal asset stubs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/assets/vscode-reh/out
          mkdir -p app/src/main/assets/usr
          mkdir -p app/src/main/assets/extensions
          printf '\x7fELF' > app/src/main/jniLibs/arm64-v8a/libnode.so
          dd if=/dev/zero bs=1 count=60 >> app/src/main/jniLibs/arm64-v8a/libnode.so 2>/dev/null

      - name: Run lint
        working-directory: .
        run: gradle lint

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          retention-days: 14
