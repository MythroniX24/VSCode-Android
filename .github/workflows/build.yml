name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Support submodule VSCodroid-main nested directory layout
        run: |
          if [ -d "VSCodroid-main" ]; then
            echo "Submodule/nested directory VSCodroid-main detected. Syncing to root directory structure..."
            [ ! -d "app" ] && ln -s VSCodroid-main/android/app app
            [ ! -d "toolchain_go" ] && ln -s VSCodroid-main/android/toolchain_go toolchain_go
            [ ! -d "toolchain_ruby" ] && ln -s VSCodroid-main/android/toolchain_ruby toolchain_ruby
            [ ! -d "toolchain_java" ] && ln -s VSCodroid-main/android/toolchain_java toolchain_java
            [ ! -d "scripts" ] && ln -s VSCodroid-main/scripts scripts
            [ ! -d "gradle" ] && ln -s VSCodroid-main/android/gradle gradle
            [ ! -f "gradlew" ] && ln -s VSCodroid-main/android/gradlew gradlew
            [ ! -f "gradlew.bat" ] && ln -s VSCodroid-main/android/gradlew.bat gradlew.bat
            [ ! -f "gradle.properties" ] && ln -s VSCodroid-main/android/gradle.properties gradle.properties
            [ ! -f "build.gradle.kts" ] && ln -s VSCodroid-main/android/build.gradle.kts build.gradle.kts
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up NDK
        run: |
          sdkmanager "ndk;27.2.12479018" --channel=0
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Cache downloaded tarballs/debs (before extraction) to avoid re-downloading ~200MB
      - name: Cache download intermediates
        uses: actions/cache@v4
        with:
          path: |
            server/*.tar.gz
            toolchains/termux-packages/*.deb
            toolchains/termux-packages/Packages
            toolchains/build/npm/
            toolchains/extensions/
          key: downloads-${{ hashFiles('scripts/download-vscode-server.sh', 'scripts/download-termux-tools.sh', 'scripts/download-npm.sh', 'scripts/download-python.sh', 'scripts/download-extensions.sh') }}
          restore-keys: |
            downloads-

      # Cache the generated assets directory (extracted, patched VS Code server + tools)
      - name: Cache generated assets
        id: cache-assets
        uses: actions/cache@v4
        with:
          path: |
            app/src/main/assets/vscode-reh/
            app/src/main/assets/usr/
            app/src/main/assets/extensions/
            app/src/main/jniLibs/arm64-v8a/
            server/vscode-reh/
          key: assets-${{ hashFiles('scripts/download-vscode-server.sh', 'scripts/download-termux-tools.sh', 'scripts/download-npm.sh', 'scripts/download-python.sh', 'scripts/download-extensions.sh', 'scripts/build-node-pty.sh') }}
          restore-keys: |
            assets-

      - name: Install system dependencies
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: sudo apt-get install -y --no-install-recommends libarchive-tools

      # Download and prepare all assets (only if not cached)
      - name: Debug directory structure
        run: ls -la && ls -la scripts/ || echo "scripts not found"

      - name: Download VS Code Server
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash ./scripts/download-vscode-server.sh

      - name: Copy VS Code Server to assets
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: |
          mkdir -p app/src/main/assets/
          rm -rf app/src/main/assets/vscode-reh
          cp -r server/vscode-reh app/src/main/assets/vscode-reh

      - name: Download Termux tools
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash ./scripts/download-termux-tools.sh

      - name: Download npm
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash ./scripts/download-npm.sh

      - name: Download Python
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash ./scripts/download-python.sh

      - name: Download extensions
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash ./scripts/download-extensions.sh

      - name: Build node-pty
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: bash ./scripts/build-node-pty.sh

      # libnode.so: Download pre-built binary from latest GitHub release.
      # If no release exists yet, create a stub so Gradle can produce an APK
      # (it will crash at runtime without a real binary).
      - name: Fetch libnode.so
        if: steps.cache-assets.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          LIBNODE="app/src/main/jniLibs/arm64-v8a/libnode.so"
          if [ -f "$LIBNODE" ] && [ "$(wc -c < "$LIBNODE")" -gt 1000 ]; then
            echo "libnode.so already exists ($(du -sh "$LIBNODE" | cut -f1))"
            exit 0
          fi
          echo "Attempting to download libnode.so from latest GitHub release..."
          if gh release download --repo "$REPO" \
               --pattern "libnode.so" \
               --dir app/src/main/jniLibs/arm64-v8a/ 2>/dev/null; then
            echo "Downloaded libnode.so ($(du -sh "$LIBNODE" | cut -f1))"
          else
            echo "WARNING: libnode.so not found in releases. Creating stub."
            echo "Build will succeed but APK will not run without a real libnode.so."
            printf '\x7fELF' > "$LIBNODE"
            dd if=/dev/zero bs=1 count=60 >> "$LIBNODE" 2>/dev/null
          fi

      - name: Verify assets
        run: |
          echo "=== Assets ==="
          ls -la app/src/main/assets/ || true
          echo ""
          echo "=== jniLibs ==="
          ls -la app/src/main/jniLibs/arm64-v8a/ || true

      - name: Build debug APK
        working-directory: .
        run: gradle assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Support submodule VSCodroid-main nested directory layout
        run: |
          if [ -d "VSCodroid-main" ]; then
            echo "Submodule/nested directory VSCodroid-main detected. Syncing to root directory structure..."
            [ ! -d "app" ] && ln -s VSCodroid-main/android/app app
            [ ! -d "toolchain_go" ] && ln -s VSCodroid-main/android/toolchain_go toolchain_go
            [ ! -d "toolchain_ruby" ] && ln -s VSCodroid-main/android/toolchain_ruby toolchain_ruby
            [ ! -d "toolchain_java" ] && ln -s VSCodroid-main/android/toolchain_java toolchain_java
            [ ! -d "scripts" ] && ln -s VSCodroid-main/scripts scripts
            [ ! -d "gradle" ] && ln -s VSCodroid-main/android/gradle gradle
            [ ! -f "gradlew" ] && ln -s VSCodroid-main/android/gradlew gradlew
            [ ! -f "gradlew.bat" ] && ln -s VSCodroid-main/android/gradlew.bat gradlew.bat
            [ ! -f "gradle.properties" ] && ln -s VSCodroid-main/android/gradle.properties gradle.properties
            [ ! -f "build.gradle.kts" ] && ln -s VSCodroid-main/android/build.gradle.kts build.gradle.kts
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Unit tests only need compiled Kotlin, not the full assets.
      # Create minimal directory structure so Gradle does not fail.
      - name: Create minimal asset stubs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/assets/vscode-reh/out
          mkdir -p app/src/main/assets/usr
          mkdir -p app/src/main/assets/extensions
          printf '\x7fELF' > app/src/main/jniLibs/arm64-v8a/libnode.so
          dd if=/dev/zero bs=1 count=60 >> app/src/main/jniLibs/arm64-v8a/libnode.so 2>/dev/null

      - name: Run unit tests
        working-directory: .
        run: gradle testDebugUnitTest
