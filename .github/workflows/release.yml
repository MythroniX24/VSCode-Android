name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Support submodule VSCodroid-main nested directory layout
        run: |
          if [ -d "VSCodroid-main" ]; then
            echo "Submodule/nested directory VSCodroid-main detected. Syncing to root directory structure..."
            SRC_PREFIX="VSCodroid-main"
            if [ -d "VSCodroid-main/android" ]; then
              echo "Using android/ nested folder structure inside VSCodroid-main..."
              SRC_PREFIX="VSCodroid-main/android"
            else
              echo "Using direct structure inside VSCodroid-main..."
            fi
            [ -d "$SRC_PREFIX/app" ] && [ ! -d "app" ] && ln -s "$SRC_PREFIX/app" app || true
            [ -d "$SRC_PREFIX/toolchain_go" ] && [ ! -d "toolchain_go" ] && ln -s "$SRC_PREFIX/toolchain_go" toolchain_go || true
            [ -d "$SRC_PREFIX/toolchain_ruby" ] && [ ! -d "toolchain_ruby" ] && ln -s "$SRC_PREFIX/toolchain_ruby" toolchain_ruby || true
            [ -d "$SRC_PREFIX/toolchain_java" ] && [ ! -d "toolchain_java" ] && ln -s "$SRC_PREFIX/toolchain_java" toolchain_java || true
            if [ -d "VSCodroid-main/scripts" ]; then
              [ ! -d "scripts" ] && ln -s "VSCodroid-main/scripts" scripts || true
            elif [ -d "VSCodroid-main/android/scripts" ]; then
              [ ! -d "scripts" ] && ln -s "VSCodroid-main/android/scripts" scripts || true
            fi
            [ -d "$SRC_PREFIX/gradle" ] && [ ! -d "gradle" ] && ln -s "$SRC_PREFIX/gradle" gradle || true
            [ -f "$SRC_PREFIX/gradlew" ] && [ ! -f "gradlew" ] && ln -s "$SRC_PREFIX/gradlew" gradlew || true
            [ -f "$SRC_PREFIX/gradlew.bat" ] && [ ! -f "gradlew.bat" ] && ln -s "$SRC_PREFIX/gradlew.bat" gradlew.bat || true
            [ -f "$SRC_PREFIX/gradle.properties" ] && [ ! -f "gradle.properties" ] && ln -s "$SRC_PREFIX/gradle.properties" gradle.properties || true
            [ -f "$SRC_PREFIX/build.gradle.kts" ] && [ ! -f "build.gradle.kts" ] && ln -s "$SRC_PREFIX/build.gradle.kts" build.gradle.kts || true
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up NDK
        run: |
          sdkmanager "ndk;27.2.12479018" --channel=0
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install system dependencies
        run: sudo apt-get install -y --no-install-recommends libarchive-tools zstd zip

      # Cache downloaded tarballs/debs
      - name: Cache download intermediates
        uses: actions/cache@v4
        with:
          path: |
            server/*.tar.gz
            toolchains/termux-packages/*.deb
            toolchains/termux-packages/Packages
            toolchains/build/npm/
            toolchains/extensions/
          key: downloads-${{ hashFiles('scripts/download-vscode-server.sh', 'scripts/download-termux-tools.sh', 'scripts/download-npm.sh', 'scripts/download-python.sh', 'scripts/download-extensions.sh') }}
          restore-keys: |
            downloads-

      # Download and prepare all core assets
      - name: Debug directory structure
        run: ls -la && ls -la scripts/ || echo "scripts not found"

      - name: Download VS Code Server
        run: bash ./scripts/download-vscode-server.sh

      - name: Copy VS Code Server to assets
        run: |
          mkdir -p app/src/main/assets/
          rm -rf app/src/main/assets/vscode-reh
          cp -r server/vscode-reh app/src/main/assets/vscode-reh

      - name: Download Termux tools
        run: bash ./scripts/download-termux-tools.sh

      - name: Download npm
        run: bash ./scripts/download-npm.sh

      - name: Download Python
        run: bash ./scripts/download-python.sh

      - name: Download extensions
        run: bash ./scripts/download-extensions.sh

      - name: Build node-pty
        run: bash ./scripts/build-node-pty.sh

      # libnode.so must exist as a GitHub release asset or be downloadable via LIBNODE_URL.
      - name: Fetch libnode.so
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          LIBNODE_URL: ${{ secrets.LIBNODE_URL }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          LIBNODE="app/src/main/jniLibs/arm64-v8a/libnode.so"
          if [ -f "$LIBNODE" ] && [ "$(wc -c < "$LIBNODE")" -gt 1000 ]; then
            echo "libnode.so already exists ($(du -sh "$LIBNODE" | cut -f1))"
            exit 0
          fi
          # Try direct URL first
          if [ -n "${LIBNODE_URL:-}" ]; then
            echo "Downloading libnode.so from LIBNODE_URL..."
            curl -L --fail --show-error -o "$LIBNODE" "$LIBNODE_URL"
            echo "Downloaded ($(du -sh "$LIBNODE" | cut -f1))"
            exit 0
          fi
          # Try current tag's release, then any release with libnode.so
          for tag in "$TAG" ""; do
            FLAG=""
            [ -n "$tag" ] && FLAG="--tag $tag"
            echo "Trying: gh release download $FLAG --pattern libnode.so ..."
            if gh release download --repo "$REPO" $FLAG \
                 --pattern "libnode.so" \
                 --dir app/src/main/jniLibs/arm64-v8a/ 2>/dev/null; then
              echo "Downloaded ($(du -sh "$LIBNODE" | cut -f1))"
              exit 0
            fi
          done
          echo "ERROR: libnode.so not found in any release. Upload it to a release first."
          exit 1

      - name: Verify assets
        run: |
          echo "=== Assets ==="
          ls -la app/src/main/assets/ || true
          echo ""
          echo "=== jniLibs ==="
          ls -la app/src/main/jniLibs/arm64-v8a/ || true
          echo ""
          LIBNODE="app/src/main/jniLibs/arm64-v8a/libnode.so"
          LIBNODE_SIZE="$(wc -c < "$LIBNODE")"
          if [ "$LIBNODE_SIZE" -lt 1000 ]; then
            echo "ERROR: libnode.so is too small ($LIBNODE_SIZE bytes). Release build requires a real binary."
            exit 1
          fi

      # Decode signing keystore from base64 secret
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Build signed APK
        working-directory: .
        env:
          VSCODROID_KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
          VSCODROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          VSCODROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          VSCODROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      # AAB requires toolchain asset packs (~360 MB) which aren't in git.
      # AAB is built locally for Play Store upload. CI only builds APK for GitHub Releases.

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            app/build/outputs/apk/release/*.apk

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Support submodule VSCodroid-main nested directory layout
        run: |
          if [ -d "VSCodroid-main" ]; then
            echo "Submodule/nested directory VSCodroid-main detected. Syncing to root directory structure..."
            SRC_PREFIX="VSCodroid-main"
            if [ -d "VSCodroid-main/android" ]; then
              echo "Using android/ nested folder structure inside VSCodroid-main..."
              SRC_PREFIX="VSCodroid-main/android"
            else
              echo "Using direct structure inside VSCodroid-main..."
            fi
            [ -d "$SRC_PREFIX/app" ] && [ ! -d "app" ] && ln -s "$SRC_PREFIX/app" app || true
            [ -d "$SRC_PREFIX/toolchain_go" ] && [ ! -d "toolchain_go" ] && ln -s "$SRC_PREFIX/toolchain_go" toolchain_go || true
            [ -d "$SRC_PREFIX/toolchain_ruby" ] && [ ! -d "toolchain_ruby" ] && ln -s "$SRC_PREFIX/toolchain_ruby" toolchain_ruby || true
            [ -d "$SRC_PREFIX/toolchain_java" ] && [ ! -d "toolchain_java" ] && ln -s "$SRC_PREFIX/toolchain_java" toolchain_java || true
            if [ -d "VSCodroid-main/scripts" ]; then
              [ ! -d "scripts" ] && ln -s "VSCodroid-main/scripts" scripts || true
            elif [ -d "VSCodroid-main/android/scripts" ]; then
              [ ! -d "scripts" ] && ln -s "VSCodroid-main/android/scripts" scripts || true
            fi
            [ -d "$SRC_PREFIX/gradle" ] && [ ! -d "gradle" ] && ln -s "$SRC_PREFIX/gradle" gradle || true
            [ -f "$SRC_PREFIX/gradlew" ] && [ ! -f "gradlew" ] && ln -s "$SRC_PREFIX/gradlew" gradlew || true
            [ -f "$SRC_PREFIX/gradlew.bat" ] && [ ! -f "gradlew.bat" ] && ln -s "$SRC_PREFIX/gradlew.bat" gradlew.bat || true
            [ -f "$SRC_PREFIX/gradle.properties" ] && [ ! -f "gradle.properties" ] && ln -s "$SRC_PREFIX/gradle.properties" gradle.properties || true
            [ -f "$SRC_PREFIX/build.gradle.kts" ] && [ ! -f "build.gradle.kts" ] && ln -s "$SRC_PREFIX/build.gradle.kts" build.gradle.kts || true
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts

      - name: Install packaging dependencies
        run: sudo apt-get install -y --no-install-recommends libarchive-tools zstd zip

      - name: Download toolchain assets
        run: |
          bash ./scripts/download-go.sh
          bash ./scripts/download-ruby.sh
          bash ./scripts/download-java.sh

      - name: Package toolchain ZIPs
        run: bash ./scripts/package-toolchains.sh

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -name "*.apk" -exec sha256sum {} \; > checksums.sha256
          for zip in ../toolchain-zips/*.zip; do
            [ -f "$zip" ] && sha256sum "$zip" >> checksums.sha256
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.apk
            toolchain-zips/*.zip
            artifacts/checksums.sha256
